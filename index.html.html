        h1 { text-align: center; color: var(--primary); margin-bottom: 10px; }

        /* 工具列 */
        .toolbar { position: sticky; top: 10px; z-index: 1000; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 25px; display: flex; flex-direction: column; gap: 10px; }
        .search-box { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #cbd5e1; font-size: 16px; outline: none; box-sizing: border-box; }
        .mode-switch { display: flex; justify-content: center; gap: 10px; margin-bottom: 5px; }
        .mode-btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #334155; color: white; transition: 0.2s; }
        .mode-btn.active { background: var(--primary); transform: scale(1.05); }

        /* 清除按鈕樣式 */
        .clear-btn { background: #64748b; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.85rem; align-self: center; transition: 0.2s; }
        .clear-btn:hover { background: #475569; }

        .filter-group { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .filter-btn { padding: 6px 14px; border: none; border-radius: 20px; cursor: pointer; font-weight: bold; background: #e2e8f0; font-size: 0.85rem; }
        .filter-btn.active { color: white; }
        .btn-all.active { background: var(--primary); }
        .btn-hard.active { background: var(--red); }
        .btn-mid.active { background: var(--orange); }
        .btn-easy.active { background: var(--green); }

        .word-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        /* 3D 卡片 */
        .flashcard { width: 100%; height: 260px; perspective: 1000px; cursor: pointer; display: block; }
        .flashcard-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .flashcard.flipped .flashcard-inner { transform: rotateY(180deg); }
        .card-front, .card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; display: flex; flex-direction: column; justify-content: center; align-items: center; border-radius: 15px; padding: 15px; box-sizing: border-box; border: 1px solid #e2e8f0; }
        .card-front { background: var(--card-front); transition: border 0.3s; }
        .card-back { background: var(--card-back); transform: rotateY(180deg); border: 2px solid var(--primary); }

        /* 測驗模式 */
        .quiz-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 2px solid #e2e8f0; transition: border 0.3s; }
        .quiz-zh { font-size: 1.2rem; font-weight: bold; color: #334155; margin-bottom: 5px; }
        .quiz-input { width: 100%; padding: 10px; border: 2px solid #cbd5e1; border-radius: 8px; font-size: 1.1rem; text-align: center; color: var(--primary); outline: none; margin: 10px 0; }
        .quiz-input.correct { border-color: var(--green); background: #f0fdf4; }
        .quiz-input.wrong { border-color: var(--red); background: #fef2f2; }

        /* 狀態邊框 */
        [data-status="hard"] .card-front, .quiz-card[data-status="hard"] { border: 4px solid var(--red); }
        [data-status="mid"] .card-front, .quiz-card[data-status="mid"] { border: 4px solid var(--orange); }
        [data-status="easy"] .card-front, .quiz-card[data-status="easy"] { border: 4px solid var(--green); }

        .word-eng { font-size: 1.6rem; font-weight: 800; color: var(--primary); }
        .word-kk { color: #64748b; font-size: 0.9rem; margin-bottom: 10px; }
        
        /* 介系詞搭配樣式優化 */
        .word-usage { font-size: 0.85rem; color: #1e293b; background: #fff; padding: 10px; border-radius: 8px; border-left: 4px solid var(--red); width: 100%; margin-top: 5px; text-align: left; line-height: 1.4; }
        .usage-tag { font-weight: bold; color: var(--red); display: inline-block; margin-bottom: 3px; }
        .hidden-usage { display: none; }

        .status-btns { display: flex; gap: 5px; margin-top: 10px; width: 100%; }
        .status-btns button { flex: 1; padding: 6px; border-radius: 5px; border: 2px solid transparent; cursor: pointer; color: white; font-size: 0.7rem; font-weight: bold; opacity: 0.4; transition: 0.2s; }
        .status-btns button.selected { opacity: 1; border-color: white; transform: scale(1.05); }
        .btn-red { background: var(--red); }
        .btn-orange { background: var(--orange); }
        .btn-green { background: var(--green); }
        .speak-btn { background: var(--primary); color: white; border: none; padding: 6px 12px; border-radius: 20px; cursor: pointer; margin: 5px 0; font-weight: bold; font-size: 0.8rem; }
        .toggle-usage-btn { background: #f1f5f9; color: #64748b; border: 1px dashed #cbd5e1; padding: 4px 10px; border-radius: 5px; cursor: pointer; font-size: 0.75rem; margin-top: 5px; }
    </style>
</head>

        ["tailor", "/ˈtelɚ/", "v.", "量身訂製", "tailor A [to/for] B"],
        ["autism", "/ˈɔtɪzəm/", "n.", "自閉症", "autism spectrum [in]"],
        ["reciprocal", "/rɪˈsɪprəkl/", "adj.", "相互", "reciprocal help [between]"],
        ["virtual", "/ˈvɝtʃuəl/", "adj.", "虛擬", "virtual reality [for]"],
        ["consistency", "/kənˈsɪstənsɪ/", "n.", "一致性", "consistency [with] policy"],
        ["unsuitable", "/ʌnˈsutəbl/", "adj.", "不適合", "unsuitable [for] children"],
        ["original", "/əˈrɪdʒənəl/", "adj.", "原創", "original work [by]"]
    ];

    let appMode = 'card';
    let currentFilter = 'all';
    let wordStatus = JSON.parse(localStorage.getItem('wordStatus152')) || {};

    function speak(text) {
        window.speechSynthesis.cancel();
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang = 'en-US';
        utter.rate = 0.9;
        window.speechSynthesis.speak(utter);
    }

    function switchMode(mode) {
        appMode = mode;
        document.getElementById('btnCardMode').classList.toggle('active', mode === 'card');
        document.getElementById('btnQuizMode').classList.toggle('active', mode === 'quiz');
        
        // 只有測驗模式才顯示「清除按鈕」
        document.getElementById('clearQuizBtn').style.display = (mode === 'quiz') ? 'block' : 'none';
        render();
    }

    function toggleStatus(word, status, event) {
        if (event) event.stopPropagation();
        wordStatus[word] = (wordStatus[word] === status) ? 'none' : status;
        localStorage.setItem('wordStatus152', JSON.stringify(wordStatus));
        render();
    }

    function getPrompt(word) {
        return word.split(' ').map(w => w.length <= 1 ? w : w[0] + "_".repeat(w.length - 2) + w[w.length-1]).join(' ');
    }

    function checkQuiz(input, correctWord) {
        const val = input.value.trim().toLowerCase();
        const ans = correctWord.toLowerCase();
        input.className = (val === ans) ? "quiz-input correct" : (val === "" ? "quiz-input" : "quiz-input wrong");
    }

    function toggleQuizUsage(btn) {
        const usageDiv = btn.nextElementSibling;
        const isHidden = usageDiv.style.display === "none" || usageDiv.style.display === "";
        usageDiv.style.display = isHidden ? "block" : "none";
        btn.innerText = isHidden ? "隱藏介系詞搭配/解答" : "查看介系詞搭配/解答";
    }

    // 新增：清除所有答案函式
    function clearAllQuiz() {
        if(confirm("確定要清空目前頁面上所有的測驗答案嗎？")) {
            const inputs = document.querySelectorAll('.quiz-input');
            inputs.forEach(input => {
                input.value = "";
                input.className = "quiz-input";
            });
        }
    }

    function render() {
        const grid = document.getElementById('mainGrid');
        const query = document.getElementById('searchInput').value.toLowerCase();
        grid.innerHTML = '';

        vocabulary.forEach(([word, kk, pos, zh, usage]) => {
            const status = wordStatus[word] || 'none';
            if (currentFilter !== 'all' && status !== currentFilter) return;
            if (!word.toLowerCase().includes(query) && !zh.toLowerCase().includes(query)) return;

            const container = document.createElement('div');
            
            if (appMode === 'card') {
                container.className = 'flashcard';
                container.setAttribute('data-status', status);
                container.onclick = function() { this.classList.toggle('flipped'); };
                container.innerHTML = `
                    <div class="flashcard-inner">
                        <div class="card-front">
                            <div class="word-eng">${word}</div>
                            <div class="word-kk">${kk}</div>
                            <button class="speak-btn" onclick="event.stopPropagation(); speak('${word.replace(/'/g, "\\'")}')">📢 發音</button>
                        </div>
                        <div class="card-back">
                            <div class="word-zh">${zh}</div>
                            <div style="color:var(--primary); font-weight:bold;">${pos}</div>
                            <div class="word-usage">
                                <span class="usage-tag">🔗 介系詞搭配:</span><br>${usage}
                            </div>
                            <div class="status-btns">
                                <button class="btn-red ${status === 'hard' ? 'selected' : ''}" onclick="toggleStatus('${word}', 'hard', event)">不熟</button>
                                <button class="btn-orange ${status === 'mid' ? 'selected' : ''}" onclick="toggleStatus('${word}', 'mid', event)">普通</button>
                                <button class="btn-green ${status === 'easy' ? 'selected' : ''}" onclick="toggleStatus('${word}', 'easy', event)">完美</button>
                            </div>
                        </div>
                    </div>
                `;
            } else {
                container.className = 'quiz-card';
                container.setAttribute('data-status', status);
                container.innerHTML = `
                    <div class="quiz-zh">${zh} <span style="font-size:0.8rem; color:#64748b;">(${pos})</span></div>
                    <div style="font-size:0.8rem; color:#94a3b8;">提示: ${getPrompt(word)}</div>
                    <input type="text" class="quiz-input" placeholder="拼寫英文..." oninput="checkQuiz(this, '${word.replace(/'/g, "\\'")}')">
                    <button class="speak-btn" onclick="speak('${word.replace(/'/g, "\\'")}')">📢 聽音</button>
                    <br>
                    <button class="toggle-usage-btn" onclick="toggleQuizUsage(this)">查看介系詞搭配/解答</button>
                    <div class="word-usage hidden-usage">
                        <span class="usage-tag">🔗 答案與搭配:</span><br>
                        <strong>${word}</strong><br>${usage}
                    </div>
                    <div class="status-btns">
                        <button class="btn-red ${status === 'hard' ? 'selected' : ''}" onclick="toggleStatus('${word}', 'hard')">不熟</button>
                        <button class="btn-orange ${status === 'mid' ? 'selected' : ''}" onclick="toggleStatus('${word}', 'mid')">普通</button>
                        <button class="btn-green ${status === 'easy' ? 'selected' : ''}" onclick="toggleStatus('${word}', 'easy')">完美</button>
                    </div>
                `;
            }
            grid.appendChild(container);
        });
    }

    function setFilter(filter, btn) {
        currentFilter = filter;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
    }

    render();
</script>
</body>
</html>
